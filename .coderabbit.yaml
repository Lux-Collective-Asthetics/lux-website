language: "en-US"

reviews:
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

path_filters:
  - "!**/node_modules/**"
  - "!**/.next/**"
  - "!**/.open-next/**"
  - "!**/package-lock.json"

path_instructions:
  - path: "app/**"
    instructions: >
      This is a Next.js App Router project deployed on Cloudflare Workers via OpenNext.
      Server actions use "use server". Client components use "use client".
      All form actions validate input, check Turnstile if configured, check rate limits if Redis is configured, then perform the operation.
      Flag any direct database access outside of lib/supabase/ or server actions.
      Flag any secrets or credentials that appear in client-side code.
  - path: "components/**"
    instructions: >
      UI components use shadcn/ui primitives. Flag direct Tailwind class duplication that should use a component.
      Flag any server-only imports (supabase service client, redis) in files without "use server".
  - path: "lib/**"
    instructions: >
      lib/supabase/service.ts uses the service role key — flag any import of this file outside of server actions or route handlers.
      lib/redis.ts exports rate limit instances — only used in server actions.
      lib/email.ts is server-only — flag any client-side import.

chat:
  auto_reply: true
